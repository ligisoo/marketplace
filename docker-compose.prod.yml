
services:
  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 --worker-class gthread --threads 4 config.wsgi:application
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on:
      - web
    restart: always

  certbot:
    image: certbot/certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-ligisoo_marketplace}
      - POSTGRES_USER=${DB_USER:-ligisoo_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-ligisoo_secret}
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume:

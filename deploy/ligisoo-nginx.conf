# ---------------------------------------------------------------------------
# Upstream — Unix socket (no TCP overhead vs Docker's web:8000)
# ---------------------------------------------------------------------------
upstream ligisoo {
    server unix:/run/gunicorn/ligisoo.sock fail_timeout=0;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect + Let's Encrypt ACME challenge
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name ligisoo.co.ke www.ligisoo.co.ke;

    # Required for certbot webroot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ligisoo.co.ke www.ligisoo.co.ke;
    http2 on;

    # --- SSL ---
    ssl_certificate     /etc/letsencrypt/live/ligisoo.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ligisoo.co.ke/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/ligisoo.co.ke/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- Request limits ---
    client_max_body_size 10M;
    client_body_timeout  30s;
    client_header_timeout 30s;

    # --- Gzip compression ---
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-font-ttf
        image/svg+xml;

    # --- Static files (served directly by nginx — bypasses Django/Gunicorn) ---
    location /static/ {
        alias /home/walter/Projects/marketplace/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # --- Media files ---
    location /media/ {
        alias /home/walter/Projects/marketplace/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # --- Django application ---
    location / {
        proxy_pass          http://ligisoo;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_redirect      off;

        # Timeouts (match gunicorn's timeout)
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Buffer tuning for low-memory server
        proxy_buffering       on;
        proxy_buffer_size     8k;
        proxy_buffers         8 8k;
    }
}
